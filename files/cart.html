<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart page</title>
    <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
    rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="cart.css">
</head>
<body>
    <header>
        <nav class="nav-bar">
            <a href="/files/amazon.html">
                <div class="first-container">
                    <img src="images/amazon-logo.png" alt="">
                </div>
            </a>
            <div class="second-container">
                <div class="checkout">Checkout</div>
                <p>(</p>
                    <p id="item_number">0 items</p>
                <p>)</p>
            </div>
            <div class="third-container">
                <i class="ri-folder-keyhole-fill"></i>
            </div> 
        </nav>
    </header>
    <main>
        <section>
            <div class="card-container">
                <div class="head"><h3>Review your order</h3></div>
                <div class="card">
                    <div class="date">Delivery date: Tuesday, May 26</div>
                    <div class="item-detail">
                        <div class="image">
                            <img src="images/products/6-piece-white-dinner-plate-set.jpg" alt="">
                        </div>
                        <div class="detail">
                            <div class="name">Black and Gray Athletic Cotton Socks - 6 Pairs</div>
                            <div class="price">$10.5</div>
                            <div class="quantity-item">
                                <p id="quantity">Quantity: 1</p>
                                <p>update</p>
                                <p>delate</p>
                            </div>
                        </div>
                        <div class="option">
                            <div>Choose a delivery option:</div>
                            <div class="option-1">
                                <input type="radio">
                                <div>
                                    <p>Tuesday, May 26</p>
                                    <p>FREE Shipping</p>
                                </div>
                            </div>
                            <div class="option-2">
                                <input type="radio">
                                <div>
                                    <p>Wednesday, May 20</p>
                                    <p>FREE Shipping</p>
                                </div>
                            </div>
                            <div class="option-3">
                                <input type="radio">
                                <div>
                                    <p>Monday, May 18</p>
                                    <p>FREE Shipping</p>
                                </div>
                            </div>
                            
                        </div>
                    </div>
                    
                </div>
                <div class="card">
                    
                </div>
                <div class="card">
                    
                </div>
            </div>
            <div class="calculation-container">
                <div class="title">Order Summary</div>
            </div>
        </section>
    </main>
</body>
<script src="data/products.js"></script>
<script src="amazon.js"></script>
<script src="cart.js"></script>
</html>
