<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <link rel="stylesheet" href="amazon.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="nav-contain">
        <nav class="navbar">
            <div class="logo">
                <a href="/files/amazon.html">
                    <img id="amazon-icon" src="/images/amazon-logo-white.png" alt="amazon logo">
                </a>
            </div>
            <div class="search-bar">
                <input type="search" id="search" placeholder="Search">
                <button>
                    <img src="/images/search-icon.png" id="search-icon" alt="search-icon">
                </button>
                    
            </div>
            <div class="things">
                <a href="/files/orders.html">
                    <div class="orders">
                           Returns
                        <div>
                            <p>&</p>
                            <p>Orders</p>
                        </div>                       
                    </div>
                </a>
                <a href="/files/cart.html">
                    <div class="cart-bar">
                        <div>
                            <p id="cart-number">0</p>
                            <img id="cart-icon" src="/images/cart-icon.png" alt="">
                        </div>
                        <h4 id="name">Cart</h4>
                    </div>
                </a>
            </div>
        </nav>
    </header>

    <main>
        <section class="container" style="padding-top: 60px;">
            <div class="card">
                <div class="image-container">
                    <img id="product_img" src="/images/athletic-cotton-socks-6-pairs.jpg" alt="">
                </div>
                <div class="name">Black and Gray Athletic Cotton Socks - 6 Pairs</div>
                <div class="ratting">
                    <img src="/images/rating-4.png" alt="">
                    <div class="person-to-rate">87</div>
                    <div class="price">$10.90</div>
                    <div class="quantity">10</div>
                    <button class="btn">Add to cart</button>
                </div>
            </div>
        </section>
    </main>
    
</body>
</html>
